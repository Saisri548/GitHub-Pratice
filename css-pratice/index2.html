<!DOCTYPE html>
<html lang="en">
<head>
  <style>
    body {
      margin: 0;
      height: 200vh;
      font-family: Arial;
    }

    /* 🟡 Card (lowest layer) */
    .card {
      position: relative;
      width: 300px;
      height: 200px;
      background: lightblue;
      margin: 100px;
      z-index: 1;
    }

    /* 🔵 Navbar (middle layer) */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background: black;
      color: white;
      padding: 15px;
      z-index: 10;
    }

    /* 🔴 Popup (TOP layer) */
    .popup {
      position: fixed;
      top: 30%;
      left: 30%;
      width: 300px;
      height: 200px;
      background: white;
      border: 2px solid black;
      z-index: 999;
    }

    /* Dark background behind popup */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.5);
      z-index: 500;
    }
  </style>
</head>
<body>

  <div class="navbar">Navbar (z-index: 10)</div>

  <div class="card">Card (z-index: 1)</div>

  <div class="overlay"></div>

  <div class="popup">Popup (z-index: 999)</div>

</body>
</html>
